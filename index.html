<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>i-Kad OCR Scanner</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 20px;
  }

  #cameraContainer {
    width: 100%;
    max-width: 420px;
    margin: auto;
    border: 2px solid #ccc;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
    position: relative;
  }

  video, canvas {
    width: 100%;
    display: block;
  }

  #captureBtn, #confirmBtn {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  #captureBtn {
    background: #2196f3;
    color: white;
  }

  #confirmBtn {
    background: #4caf50;
    color: white;
    display: none;
  }

  #fields {
    margin-top: 20px;
    padding: 15px;
    background: white;
    border-radius: 8px;
    font-size: 16px;
  }

  #log {
    margin-top: 20px;
    padding: 10px;
    background: #222;
    color: #0f0;
    height: 150px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 13px;
    border-radius: 8px;
  }
</style>
</head>

<body>

<h2>i-Kad OCR Scanner</h2>

<div id="cameraContainer">
  <video id="video" autoplay playsinline></video>
  <canvas id="captureCanvas" style="display:none;"></canvas>
</div>

<button id="captureBtn">Capture</button>
<button id="confirmBtn">Save to Google Sheet</button>

<div id="fields"></div>

<pre id="log"></pre>

<!-- Tesseract.js -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<!-- Your JS file -->
<script src="script.js"></script>

</body>
</html>
