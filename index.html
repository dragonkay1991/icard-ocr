<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>i-Kad OCR Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
      text-align: center;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    #cameraContainer {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    #video {
      width: 100%;
      border-radius: 10px;
      background: #000;
    }

    /* Perfect ID-card style frame */
    #scanFrame {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 90%;
      aspect-ratio: 1.586; /* ID card ratio */
      transform: translate(-50%, -50%);
      border: 4px solid red;
      border-radius: 12px;
      pointer-events: none;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      transition: border-color 0.2s ease;
    }

    #resultBox {
      margin-top: 15px;
      text-align: left;
      background: #fff;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
      font-size: 14px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    #fields div {
      margin-bottom: 4px;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      background: #1976d2;
      color: #fff;
    }

    #log {
      margin-top: 10px;
      font-size: 11px;
      text-align: left;
      white-space: pre-wrap;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      color: #555;
    }
  </style>

  <!-- Tesseract.js -->
  <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

  <!-- OpenCV.js -->
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
</head>

<body>
  <h2>i-Kad OCR Scanner</h2>

  <div id="cameraContainer">
    <video id="video" autoplay playsinline></video>
    <div id="scanFrame"></div>
  </div>

  <!-- Full-res canvas for processing -->
  <canvas id="canvas" width="1920" height="1080" style="display:none;"></canvas>

  <div id="resultBox">
    <strong>Extracted Data</strong>
    <div id="fields"></div>
    <button id="confirmBtn" style="display:none;">Confirm &amp; Save</button>
  </div>

  <div id="log"></div>

  <script src="script.js"></script>
</body>
</html>
